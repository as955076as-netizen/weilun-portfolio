<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | AI Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 色彩規範與全域變數 */
        :root {
            --bg-dark: #0a0a0c;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 玻璃擬態導覽列 (Glassmorphism) */
        .nav-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 精品雜誌感微小標籤 (Eyebrow Text) */
        .eyebrow {
            letter-spacing: 0.25em;
            color: var(--accent-gold);
        }

        /* 超大號主標題排版 */
        .hero-title {
            line-height: 1.05;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
        }

        /* 按鈕互動質感 */
        .btn-gold-outline {
            border-color: rgba(200, 169, 126, 0.4);
            color: var(--accent-gold);
        }
        .btn-gold-outline:hover {
            background-color: rgba(200, 169, 126, 0.1);
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(200, 169, 126, 0.15);
        }

        /* 預留給 JS 的特效畫布層 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
            pointer-events: none; /* 確保不阻擋滑鼠點擊 */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-[#c8a97e] selection:text-[#0a0a0c]">

    <canvas id="particle-canvas"></canvas>

    <nav class="nav-glass fixed w-full z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="font-bold text-xl tracking-widest text-white">WL.G</div>
            <div class="hidden md:flex space-x-10 text-xs font-light tracking-[0.2em] text-white/60">
                <a href="#about" class="hover:text-[#c8a97e] transition-colors duration-300">ABOUT</a>
                <a href="#works" class="hover:text-[#c8a97e] transition-colors duration-300">WORKS</a>
                <a href="#contact" class="hover:text-[#c8a97e] transition-colors duration-300">CONTACT</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center px-6 pt-32 pb-20 relative z-10 min-h-screen">
        <div class="max-w-7xl mx-auto w-full flex flex-col items-start space-y-10">
            
            <div class="eyebrow text-sm font-medium uppercase flex items-center space-x-4">
                <span class="w-10 h-[1px] bg-[#c8a97e]"></span>
                <span>// Cross-Disciplinary AI Engineering</span>
            </div>

            <div class="flex flex-col space-y-4">
                <h1 class="hero-title text-7xl md:text-8xl lg:text-[9rem] font-black tracking-tighter text-white">
                    ENGINEERING
                </h1>
                <h1 class="hero-title text-7xl md:text-8xl lg:text-[9rem] font-black tracking-tighter text-white/80">
                    THE UNSEEN.
                </h1>
                <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold mt-6 tracking-[0.15em] text-white/90">
                    賦 能 視 覺・智 動 未 來
                </h2>
            </div>

            <p class="text-base md:text-lg lg:text-xl text-white/60 max-w-2xl leading-relaxed font-light mt-8 tracking-wide">
                將系統整合的絕對精準，注入人工智慧的維度。<br>
                專注於電腦視覺、流程自動化與數據工程，<br>
                在實務與演算法的交界，重新定義技術的深度與廣度。
            </p>

            <div class="pt-8">
                <a href="#works" class="btn-gold-outline border inline-flex items-center justify-center px-10 py-4 text-sm tracking-[0.2em] font-light transition-all duration-300">
                    EXPLORE WORKS
                </a>
            </div>

        </div>
    </main>

</body>
</html>
