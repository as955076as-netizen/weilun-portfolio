<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROY | AI Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏整個頁面的預設滑鼠（僅在有支援 hover 的電腦裝置上生效） */
        @media (hover: hover) and (pointer: fine) {
            body, a, button, h1, p { cursor: none !important; }
        }

        /* 游標圓點 (Dot) 的核心發光與暈光 */
        #cursor-dot {
            background-color: #fff;
            box-shadow: 0 0 5px #fff, 
                        0 0 10px var(--accent-gold), 
                        0 0 20px var(--accent-gold), 
                        0 0 30px rgba(200, 169, 126, 0.5);
            transition: transform 0.1s;
        }

        /* 游標外圈 (Ring) 的霓虹發光 */
        #cursor-ring {
            border-color: rgba(200, 169, 126, 0.8);
            filter: drop-shadow(0 0 4px var(--accent-gold));
            transition: all 0.3s ease-out;
        }

        /* 游標碰到可點擊元素時的「強烈發光」狀態 */
        .cursor-hover-active {
            transform: translate(-50%, -50%) scale(1.6) !important;
            background-color: rgba(200, 169, 126, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.9) !important;
            filter: drop-shadow(0 0 10px var(--accent-gold)) drop-shadow(0 0 5px #fff) !important;
        }

        /* --- 全螢幕背景呼吸燈特效 (優化版) --- */
        .ambient-breathe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2; 
            pointer-events: none;
            
            /* 1. 改用徑向漸變，讓呼吸燈看起來像從中心擴散的柔光 */
            background: radial-gradient(
                circle at center, 
                rgba(200, 169, 126, 0.15) 0%, 
                rgba(0, 0, 0, 0) 70%
            );
            
            /* 2. 引入 will-change 進行 GPU 加速，提升動畫流暢度 */
            will-change: opacity;
            
            /* 3. 將時間調整為 4 秒，呼吸節奏更沈穩 */
            /* 使用 cubic-bezier 讓吸氣/吐氣的起伏更細膩 */
            animation: full-breathe 4s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
        }
        
        /* 呼吸的核心動畫：限制在 0.2 到 0.5 之間，避免過度明暗造成的視覺疲勞 */
        @keyframes full-breathe {
            0% { opacity: 0.1; }   
            100% { opacity: 1; } 
        }
        
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }
        
        .btn-capsule {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            /* 保持原有的互動邏輯 */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s;
        }
        
        .btn-capsule:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(200, 169, 126, 0.2);
        }

        /* --- 超大主標題特效控制開始 --- */
        .watermark-title {
            position: relative;
            /* [修改] 拿掉背景漸層動畫，改回純色低透明度的靜態浮水印 */
            color: rgba(255, 255, 255, 0.08); 
            user-select: none;
        }

        /* 懸停時的水墨填滿特效 (保留) */
        .watermark-title::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            
            color: var(--accent-gold);
            -webkit-text-stroke: 0px transparent;
            
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s ease;
            z-index: 1;
            filter: drop-shadow(0 0 0px rgba(200, 169, 126, 0));
        }

        .watermark-title:hover::before {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            filter: drop-shadow(0 0 15px rgba(200, 169, 126, 0.3));
        }
        /* --- 超大主標題特效控制結束 --- */
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white/20 selection:text-white">

    <div class="ambient-breathe"></div>

    <div id="cursor-dot" class="hidden md:block pointer-events-none fixed top-0 left-0 w-2 h-2 bg-[#c8a97e] rounded-full z-[100] transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-100"></div>
    <div id="cursor-ring" class="hidden md:block pointer-events-none fixed top-0 left-0 w-10 h-10 border border-[#c8a97e]/50 rounded-full z-[99] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out"></div>

    <canvas id="particle-canvas"></canvas>

    <main class="flex-grow flex items-center justify-center px-8 relative z-10 min-h-screen w-full"> 
        <div class="w-full px-8 lg:px-20 mx-auto flex flex-col items-center justify-center text-center"> 
            <div class="text-xs md:text-sm font-bold tracking-[0.5em] text-white/80 mb-6 md:mb-10 pl-[0.5em]">K U A N . 2 0 2 6</div>

            <div class="overflow-visible w-full flex items-center justify-center">
                <h1 class="watermark-title inline-block px-[6vw] text-[4vw] sm:text-[6vw] md:text-[10vw] lg:text-[14vw] font-black leading-none tracking-tighter overflow-visible mb-22 md:mb-30" data-text="ROY">
                    ROY
            </div>
            <p class="text-xs md:text-sm lg:text-base text-white/60 tracking-[0.15em] md:tracking-[0.2em] font-light mt-6 md:mt-10 lg:mt-12 z-10 px-4">
                電腦視覺 · 流程自動化 · 影音工程<br>
                「從實務現場跨越至演算法開發，以精準的自動化邏輯，重構視覺工程的無限可能。」
            </p>

            <div class="pt-16 md:pt-24 flex flex-col items-center space-y-6 z-10">
                <a href="#works" class="btn-capsule group inline-flex items-center justify-center px-10 py-3 md:py-4 rounded-full text-sm font-medium tracking-[0.2em] transition-all duration-300">
                    <span class="pl-[0.2em]">進入系統</span>
                    <span class="ml-4 font-inter text-lg group-hover:translate-x-1 transition-transform duration-300">→</span>
                </a>
                
                <div class="text-[9px] md:text-[10px] tracking-[0.3em] font-inter text-[#c8a97e]/60 pl-[0.3em]">
                    * ENTER EXPERIENCE
                </div>
            </div>

        </div>
    </main>
    
<script>
    // ==========================================
    // 1. 高奢版數位訊號雨 (Minimalist Matrix Rain)
    // ==========================================
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    let w, h;
    let columns = [];
    let drops = [];
    const fontSize = 16;
    // 包含二進位與基礎十六進位代碼，呼應演算法底層
    const charset = "0101010101010189ABCDEF"; 

    function initCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        columns = Math.floor(w / fontSize);
        drops = [];
        
        // 初始化水滴位置，給予隨機負值讓它們不要同時落下
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }
    }
    
    initCanvas();

    window.addEventListener('resize', initCanvas);

    // 取得滑鼠座標，用於發光互動
    let mouseX = -1000;
    let mouseY = -1000;
    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function drawMatrix() {
        // 畫一層半透明的黑色背景，製造代碼逐漸消失的「拖尾效應」
        ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
        ctx.fillRect(0, 0, w, h);

        ctx.font = `300 ${fontSize}px "Inter", monospace`;
        ctx.textAlign = 'center';

        for (let i = 0; i < drops.length; i++) {
            // 隨機抽取字元
            const text = charset.charAt(Math.floor(Math.random() * charset.length));
            
            const x = i * fontSize + (fontSize / 2);
            const y = drops[i] * fontSize;

            // 計算文字與滑鼠的距離
            const dx = x - mouseX;
            const dy = y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // 如果滑鼠靠近，代碼會變亮；平時則是極低透明度的暗金微光
            if (dist < 120) {
                ctx.fillStyle = `rgba(200, 169, 126, 0.6)`;
            } else {
                ctx.fillStyle = `rgba(200, 169, 126, 0.08)`;
            }

            ctx.fillText(text, x, y);

            // 當代碼超出螢幕底部，且隨機機率達成時，回到頂部重新落下
            // 0.98 的機率讓雨滴顯得很稀疏、克制，不會干擾閱讀
            if (y > h && Math.random() > 0.98) {
                drops[i] = 0;
            }

            // 控制下落速度 (0.5 代表半速，更有緩慢深沉的精品視覺感)
            drops[i] += 0.5;
        }
    }

    function animateMatrix() {
        requestAnimationFrame(animateMatrix);
        drawMatrix();
    }

    animateMatrix();
    
    // ==========================================
    // 2. 自訂發光延遲游標
    // ==========================================
    const cursorDot = document.getElementById('cursor-dot');
    const cursorRing = document.getElementById('cursor-ring');
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let ringX = cursorX;
    let ringY = cursorY;

    window.addEventListener('mousemove', (e) => {
        cursorX = e.clientX;
        cursorY = e.clientY;
        
        if(cursorDot) {
            cursorDot.style.left = `${cursorX}px`;
            cursorDot.style.top = `${cursorY}px`;
        }
    });

    function animateCursor() {
        ringX += (cursorX - ringX) * 0.15;
        ringY += (cursorY - ringY) * 0.15;
        
        if(cursorRing) {
            cursorRing.style.left = `${ringX}px`;
            cursorRing.style.top = `${ringY}px`;
        }
        requestAnimationFrame(animateCursor);
    }
    animateCursor();

    const interactables = document.querySelectorAll('a, button');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
            if(cursorRing) cursorRing.classList.add('cursor-hover-active');
            if(cursorDot) {
                cursorDot.style.transform = 'translate(-50%, -50%) scale(0.6)';
                cursorDot.style.backgroundColor = '#c8a97e'; 
                cursorDot.style.boxShadow = '0 0 10px #fff, 0 0 20px #c8a97e, 0 0 30px #c8a97e';
            }
        });
        el.addEventListener('mouseleave', () => {
            if(cursorRing) cursorRing.classList.remove('cursor-hover-active');
            if(cursorDot) {
                cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorDot.style.backgroundColor = '#fff';
                cursorDot.style.boxShadow = '0 0 5px #fff, 0 0 10px #c8a97e, 0 0 20px #c8a97e, 0 0 30px rgba(200, 169, 126, 0.5)';
            }
        });
    });

    // ==========================================
    // 3. 磁性吸附按鈕
    // ==========================================
    const magneticBtn = document.querySelector('.btn-capsule');
    if(magneticBtn) {
        magneticBtn.addEventListener('mousemove', (e) => {
            const rect = magneticBtn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            magneticBtn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        magneticBtn.addEventListener('mouseleave', () => {
            magneticBtn.style.transform = `translate(0px, 0px)`;
        });
    }
</script>
</body>
</html>
