<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROY | AI Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- 超大主標題特效控制開始 --- */
        .watermark-title {
            position: relative;
            color: transparent; /* 文字本身透明，以利 background-clip text */
            user-select: none;
            
            /* 平時：低透明度白/金流動光澤 */
            background: linear-gradient(
                120deg,
                rgba(255, 255, 255, 0.03) 0%,
                rgba(255, 255, 255, 0.03) 30%,
                rgba(200, 169, 126, 0.15) 50%, /* 溫潤金光澤 */
                rgba(255, 255, 255, 0.03) 70%,
                rgba(255, 255, 255, 0.03) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: metallic-shine 10s linear infinite;
        }

        /* 懸停：水墨描邊填滿特效 */
        .watermark-title::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            
            color: var(--accent-gold);
            -webkit-text-stroke: 0px transparent;
            
            /* 初期狀態：clip-path 裁切在最底部 */
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s ease;
            z-index: 1;
            filter: drop-shadow(0 0 0px rgba(200, 169, 126, 0));
        }

        /* 滑鼠懸停時觸發填滿與發光 */
        .watermark-title:hover::before {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            filter: drop-shadow(0 0 15px rgba(200, 169, 126, 0.3));
        }

        @keyframes metallic-shine {
            to {
                background-position: 200% center;
            }
        }
        /* --- 超大主標題特效控制結束 --- */

        .btn-capsule {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .btn-capsule:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white/20 selection:text-white">

    <canvas id="particle-canvas"></canvas>

    <main class="flex-grow flex items-center justify-center px-6 relative z-10 min-h-screen">
        <div class="max-w-7xl mx-auto w-full flex flex-col items-center justify-center text-center">
            
            <div class="text-xs md:text-sm font-bold tracking-[0.5em] text-white/80 mb-6 md:mb-10 pl-[0.5em]">
                K U A N . 2 0 2 6
            </div>

            <h1 class="watermark-title text-[6rem] sm:text-[9rem] md:text-[12rem] lg:text-[14rem] font-black leading-none tracking-tighter mb-12 md:mb-20" data-text="ROY">
                ROY
            </h1>

            <p class="text-xs md:text-sm lg:text-base text-white/60 tracking-[0.15em] md:tracking-[0.2em] font-light z-10 px-4">
                電腦視覺 · 流程自動化 · 影音工程<br>
                「從實務現場跨越至演算法開發，以精準的自動化邏輯，重構視覺工程的無限可能。」
            </p>

            <div class="pt-16 md:pt-24 flex flex-col items-center space-y-6 z-10">
                <a href="#works" class="btn-capsule group inline-flex items-center justify-center px-10 py-3 md:py-4 rounded-full text-sm font-medium tracking-[0.2em] transition-all duration-300">
                    <span class="pl-[0.2em]">進入系統</span>
                    <span class="ml-4 font-inter text-lg group-hover:translate-x-1 transition-transform duration-300">→</span>
                </a>
                
                <div class="text-[9px] md:text-[10px] tracking-[0.3em] font-inter text-[#c8a97e]/60 pl-[0.3em]">
                    * ENTER EXPERIENCE
                </div>
            </div>

        </div>
    </main>
    
<script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    let particlesArray = [];
    let w, h;

    const mouse = {
        x: null,
        y: null,
        radius: 150 
    };

    window.addEventListener('mousemove', (event) => {
        mouse.x = event.x;
        mouse.y = event.y;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = null;
        mouse.y = null;
    });

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        init();
    });

    class Particle {
        constructor(x, y, directionX, directionY, size, color) {
            this.x = x;
            this.y = y;
            this.directionX = directionX;
            this.directionY = directionY;
            this.size = size;
            this.color = color;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
        }

        update() {
            if (this.x > w || this.x < 0) {
                this.directionX = -this.directionX;
            }
            if (this.y > h || this.y < 0) {
                this.directionY = -this.directionY;
            }

            this.x += this.directionX;
            this.y += this.directionY;
            this.draw();
        }
    }

    function init() {
        particlesArray = [];
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        
        let numberOfParticles = (w * h) / 12000;
        
        for (let i = 0; i < numberOfParticles; i++) {
            let size = (Math.random() * 1.5) + 0.5; 
            let x = (Math.random() * ((w - size * 2) - (size * 2)) + size * 2);
            let y = (Math.random() * ((h - size * 2) - (size * 2)) + size * 2);
            let directionX = (Math.random() - 0.5) * 0.6; 
            let directionY = (Math.random() - 0.5) * 0.6;
            let color = 'rgba(200, 169, 126, 0.8)'; 

            particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
        }
    }

    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                             + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                
                if (distance < (w / 15) * (h / 15)) {
                    opacityValue = 1 - (distance / 20000);
                    ctx.strokeStyle = `rgba(200, 169, 126, ${opacityValue})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                    ctx.stroke();
                }
            }

            if (mouse.x != null && mouse.y != null) {
                let dx = particlesArray[a].x - mouse.x;
                let dy = particlesArray[a].y - mouse.y;
                let mouseDistance = Math.sqrt(dx * dx + dy * dy);

                if (mouseDistance < mouse.radius) {
                    let mouseOpacity = 1 - (mouseDistance / mouse.radius);
                    ctx.strokeStyle = `rgba(200, 169, 126, ${mouseOpacity})`;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, w, h);

        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
        }
        connect();
    }

    init();
    animate();
</script>
</body>
</html>
