<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROY | AI Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏預設滑鼠 */
        @media (hover: hover) and (pointer: fine) {
            body, a, button, h1, p { cursor: none !important; }
        }

        /* 游標圓點 (Dot) */
        #cursor-dot {
            background-color: #fff;
            box-shadow: 0 0 5px #fff, 0 0 10px var(--accent-gold), 0 0 20px var(--accent-gold), 0 0 30px rgba(200, 169, 126, 0.5);
            transition: transform 0.1s;
        }

        /* 游標外圈 (Ring) */
        #cursor-ring {
            border-color: rgba(200, 169, 126, 0.8);
            filter: drop-shadow(0 0 4px var(--accent-gold));
            transition: all 0.3s ease-out;
        }

        .cursor-hover-active {
            transform: translate(-50%, -50%) scale(1.6) !important;
            background-color: rgba(200, 169, 126, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.9) !important;
            filter: drop-shadow(0 0 10px var(--accent-gold)) drop-shadow(0 0 5px #fff) !important;
        }

        /* [關鍵優化] 將呼吸燈改為背景漸層浮水印 (靜態)，與幾何特效更融合 */
        .ambient-breathe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2; 
            pointer-events: none;
            /* 改用更低透明度的徑向漸變，當作底層氛圍 */
            background: radial-gradient(circle at center, rgba(200, 169, 126, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
        }
        
        #pathway-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* [加強] 將整體透明度從 0.8 提高到 1.0 */
            opacity: 1.0; 
            pointer-events: none;
        }
        
        .btn-capsule {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s;
        }
        
        .btn-capsule:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(200, 169, 126, 0.2);
        }

        .watermark-title {
            position: relative;
            color: rgba(255, 255, 255, 0.08); 
            user-select: none;
        }

        .watermark-title::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--accent-gold);
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s ease;
            z-index: 1;
            filter: drop-shadow(0 0 0px rgba(200, 169, 126, 0));
        }

        .watermark-title:hover::before {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            filter: drop-shadow(0 0 15px rgba(200, 169, 126, 0.3));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white/20 selection:text-white">

    <div class="ambient-breathe"></div>

    <div id="cursor-dot" class="hidden md:block pointer-events-none fixed top-0 left-0 w-2 h-2 bg-[#c8a97e] rounded-full z-[100] transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-100"></div>
    <div id="cursor-ring" class="hidden md:block pointer-events-none fixed top-0 left-0 w-10 h-10 border border-[#c8a97e]/50 rounded-full z-[99] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out"></div>

    <canvas id="pathway-canvas"></canvas>

    <main class="flex-grow flex items-center justify-center px-8 relative z-10 min-h-screen w-full"> 
        <div class="w-full px-8 lg:px-20 mx-auto flex flex-col items-center justify-center text-center"> 
            <div class="text-xs md:text-sm font-bold tracking-[0.5em] text-white/80 mb-6 md:mb-10 pl-[0.5em]">K U A N . 2 0 2 6</div>

            <div class="overflow-visible w-full flex items-center justify-center relative top-10 md:top-20">
                <h1 class="watermark-title inline-block px-4 py-2 text-[4rem] sm:text-[6rem] md:text-[8rem] lg:text-[10rem] font-black leading-none tracking-tighter overflow-visible mb-12 md:mb-20" data-text="ROY">
                    ROY
                </h1>
            </div>
            <p class="text-xs md:text-sm lg:text-base text-white/60 tracking-[0.15em] md:tracking-[0.2em] font-light mt-6 md:mt-10 lg:mt-12 z-10 px-4">
                電腦視覺 · 流程自動化 · 影音工程<br>
                「從實務現場跨越至演算法開發，以精準的自動化邏輯，重構視覺工程的無限可能。」
            </p>

            <div class="pt-16 md:pt-24 flex flex-col items-center space-y-6 z-10">
                <a href="#works" class="btn-capsule group inline-flex items-center justify-center px-10 py-3 md:py-4 rounded-full text-sm font-medium tracking-[0.2em] transition-all duration-300">
                    <span class="pl-[0.2em]">進入系統</span>
                    <span class="ml-4 font-inter text-lg group-hover:translate-x-1 transition-transform duration-300">→</span>
                </a>
                
                <div class="text-[9px] md:text-[10px] tracking-[0.3em] font-inter text-[#c8a97e]/60 pl-[0.3em]">
                    * ENTER EXPERIENCE
                </div>
            </div>

        </div>
    </main>
    
<script>
    // ==========================================
    // 1. [加強版] 幾何視覺鎖定特效 (Vision Tracking Nodes)
    // ==========================================
    const canvas = document.getElementById('pathway-canvas');
    const ctx = canvas.getContext('2d');
    
    let w, h;
    let targets = [];

    // 滑鼠座標，作為 Scanner 的目標
    const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    // 主掃描框 (Scanner) 的當前位置
    const scanner = { x: window.innerWidth / 2, y: window.innerHeight / 2, size: 60 };

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; initCV(); });

    // 線性插值，創造 Scanner 的物理滑動感
    function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }

    // 繪製科技感的 YOLO 辨識框 ⌜ ⌝ ⌞ ⌟
    function drawCorners(x, y, size, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 2; // 加粗線條
        const l = size / 3; const s = size / 2;
        ctx.beginPath();
        // 左上
        ctx.moveTo(x - s, y - s + l); ctx.lineTo(x - s, y - s); ctx.lineTo(x - s + l, y - s);
        // 右上
        ctx.moveTo(x + s - l, y - s); ctx.lineTo(x + s, y - s); ctx.lineTo(x + s, y - s + l);
        // 右下
        ctx.moveTo(x + s, y + s - l); ctx.lineTo(x + s, y + s); ctx.lineTo(x + s - l, y + s);
        // 左下
        ctx.moveTo(x - s + l, y + s); ctx.lineTo(x - s, y + s); ctx.lineTo(x - s, y + s - l);
        ctx.stroke();
    }

    // 繪製背景隱約的十字準星
    function drawCross(x, y, size, color) { ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x - size/2, y); ctx.lineTo(x + size/2, y); ctx.moveTo(x, y - size/2); ctx.lineTo(x, y + size/2); ctx.stroke(); }

    class VisionTarget {
        constructor() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.vx = (Math.random() - 0.5) * 0.4; // [加強] 加快目標漂浮速度
            this.vy = (Math.random() - 0.5) * 0.4;
            this.size = Math.random() * 20 + 20; // [加強] 加大目標大小
            this.lockProgress = 0; // 0 到 1 的鎖定進度
            this.id = Math.floor(Math.random() * 9999).toString().padStart(4, '0');
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.x < 0 || this.x > w) this.vx *= -1;
            if(this.y < 0 || this.y > h) this.vy *= -1;

            let dx = this.x - scanner.x; let dy = this.y - scanner.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            // [加強] 縮小鎖定半徑到 200px，讓滑鼠靠近時才亮起，創造感應感
            if(dist < 200) { this.lockProgress = Math.min(1, this.lockProgress + 0.08); } 
            else { this.lockProgress = Math.max(0, this.lockProgress - 0.03); }
            this.draw();
        }
        draw() {
            // [加強] 背景準星從 0.1 提高到 0.15 亮度
            drawCross(this.x, this.y, 5, 'rgba(255, 255, 255, 0.15)');

            if(this.lockProgress > 0) {
                // 1. 鎖定框 (收縮動畫)
                let currentBoxSize = this.size + (1 - this.lockProgress) * 40; 
                // [加強] 鎖定框亮度提高到 0.8
                drawCorners(this.x, this.y, currentBoxSize, `rgba(200, 169, 126, ${this.lockProgress * 0.8})`);

                // 2. 數據連接虛線
                ctx.beginPath(); ctx.moveTo(scanner.x, scanner.y); ctx.lineTo(this.x, this.y);
                // [加強] 虛線亮度從 0.3 提高到 0.4
                ctx.strokeStyle = `rgba(200, 169, 126, ${this.lockProgress * 0.4})`;
                ctx.setLineDash([2, 5]); ctx.stroke(); ctx.setLineDash([]); // 重置為實線

                // 3. 文字資訊 OBJ ID & CONF
                ctx.font = "9px Inter, monospace";
                // [加強] 文字亮度提高到 1.0 (白色)
                ctx.fillStyle = `rgba(255, 255, 255, ${this.lockProgress})`;
                ctx.fillText(`OBJ_${this.id}`, this.x + currentBoxSize/2 + 5, this.y - currentBoxSize/2 + 3);
                ctx.fillText(`CONF: ${(this.lockProgress * 99).toFixed(0)}%`, this.x + currentBoxSize/2 + 5, this.y - currentBoxSize/2 + 15);
            }
        }
    }

    function initCV() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        targets = [];
        // [關鍵加強] 大幅增加目標密度 (密度提高一倍多)
        let numTargets = (w * h) / 15000; 
        for(let i = 0; i < numTargets; i++) targets.push(new VisionTarget());
    }

    function animateCV() {
        requestAnimationFrame(animateCV); ctx.clearRect(0, 0, w, h);
        
        // [加強] 加快 Scanner 跟隨速度，從 0.1 提高到 0.15
        scanner.x = lerp(scanner.x, mouse.x, 0.15);
        scanner.y = lerp(scanner.y, mouse.y, 0.15);

        for (let i = 0; i < targets.length; i++) targets[i].update();
        
        // [加強] 主追蹤框亮度提高，size 從 50 加大到 60
        drawCorners(scanner.x, scanner.y, scanner.size, 'rgba(200, 169, 126, 0.7)');
        drawCross(scanner.x, scanner.y, 15, 'rgba(200, 169, 126, 0.5)');
    }

    initCV(); animateCV();

    // ==========================================
    // 2. 自訂發光游標與按鈕邏輯 (保留不變)
    // ==========================================
    const cursorDot = document.getElementById('cursor-dot');
    const cursorRing = document.getElementById('cursor-ring');
    let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2, ringX = cursorX, ringY = cursorY;
    window.addEventListener('mousemove', (e) => { cursorX = e.clientX; cursorY = e.clientY; if(cursorDot) { cursorDot.style.left = `${cursorX}px`; cursorDot.style.top = `${cursorY}px`; } });
    function animateCursor() { ringX += (cursorX - ringX) * 0.15; ringY += (cursorY - ringY) * 0.15; if(cursorRing) { cursorRing.style.left = `${ringX}px`; cursorRing.style.top = `${ringY}px`; } requestAnimationFrame(animateCursor); } animateCursor();
    const interactables = document.querySelectorAll('a, button');
    interactables.forEach(el => { el.addEventListener('mouseenter', () => { if(cursorRing) cursorRing.classList.add('cursor-hover-active'); if(cursorDot) { cursorDot.style.transform = 'translate(-50%, -50%) scale(0.6)'; cursorDot.style.backgroundColor = '#c8a97e'; cursorDot.style.boxShadow = '0 0 10px #fff, 0 0 20px #c8a97e, 0 0 30px #c8a97e'; } }); el.addEventListener('mouseleave', () => { if(cursorRing) cursorRing.classList.remove('cursor-hover-active'); if(cursorDot) { cursorDot.style.transform = 'translate(-50%, -50%) scale(1)'; cursorDot.style.backgroundColor = '#fff'; cursorDot.style.boxShadow = '0 0 5px #fff, 0 0 10px #c8a97e, 0 0 20px #c8a97e, 0 0 30px rgba(200, 169, 126, 0.5)'; } }); });
    const magneticBtn = document.querySelector('.btn-capsule'); if(magneticBtn) { magneticBtn.addEventListener('mousemove', (e) => { const rect = magneticBtn.getBoundingClientRect(); const x = e.clientX - rect.left - rect.width / 2; const y = e.clientY - rect.top - rect.height / 2; magneticBtn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`; }); magneticBtn.addEventListener('mouseleave', () => { magneticBtn.style.transform = `translate(0px, 0px)`; }); }
</script>
</body>
</html>
