<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROY | AI Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏預設滑鼠 */
        @media (hover: hover) and (pointer: fine) {
            body, a, button, h1, p { cursor: none !important; }
        }

        /* 游標圓點 (Dot) */
        #cursor-dot {
            background-color: #fff;
            box-shadow: 0 0 5px #fff, 0 0 10px var(--accent-gold), 0 0 20px var(--accent-gold), 0 0 30px rgba(200, 169, 126, 0.5);
            transition: transform 0.1s;
        }

        /* 游標外圈 (Ring) */
        #cursor-ring {
            border-color: rgba(200, 169, 126, 0.8);
            filter: drop-shadow(0 0 4px var(--accent-gold));
            transition: all 0.3s ease-out;
        }

        .cursor-hover-active {
            transform: translate(-50%, -50%) scale(1.6) !important;
            background-color: rgba(200, 169, 126, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.9) !important;
            filter: drop-shadow(0 0 10px var(--accent-gold)) drop-shadow(0 0 5px #fff) !important;
        }

        /* 背景呼吸燈 */
        .ambient-breathe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2; 
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(200, 169, 126, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            will-change: opacity;
            animation: full-breathe 4s cubic-bezier(0.4, 0, 0.6, 1) infinite alternate;
        }
        
        @keyframes full-breathe {
            0% { opacity: 0.1; }   
            100% { opacity: 1; } 
        }

        /* 光軌畫布 */
        #pathway-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
            pointer-events: none;
        }
        
        .btn-capsule {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s;
        }
        
        .btn-capsule:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(200, 169, 126, 0.2);
        }

        .watermark-title {
            position: relative;
            color: rgba(255, 255, 255, 0.08); 
            user-select: none;
        }

        .watermark-title::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--accent-gold);
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s ease;
            z-index: 1;
            filter: drop-shadow(0 0 0px rgba(200, 169, 126, 0));
        }

        .watermark-title:hover::before {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            filter: drop-shadow(0 0 15px rgba(200, 169, 126, 0.3));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white/20 selection:text-white">

    <div class="ambient-breathe"></div>

    <div id="cursor-dot" class="hidden md:block pointer-events-none fixed top-0 left-0 w-2 h-2 bg-[#c8a97e] rounded-full z-[100] transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-100"></div>
    <div id="cursor-ring" class="hidden md:block pointer-events-none fixed top-0 left-0 w-10 h-10 border border-[#c8a97e]/50 rounded-full z-[99] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out"></div>

    <canvas id="pathway-canvas"></canvas>

    <main class="flex-grow flex items-center justify-center px-8 relative z-10 min-h-screen w-full"> 
        <div class="w-full px-8 lg:px-20 mx-auto flex flex-col items-center justify-center text-center"> 
            <div class="text-xs md:text-sm font-bold tracking-[0.5em] text-white/80 mb-6 md:mb-10 pl-[0.5em]">K U A N . 2 0 2 6</div>

            <!-- [修改重點] 
                 1. 加上 relative top-10 md:top-20：讓它單獨往下位移，不影響上下元素
                 2. 縮小 text-[大小] 數值，並把 px 改回 px-4
            -->
            <div class="overflow-visible w-full flex items-center justify-center relative top-10 md:top-20">
                <h1 class="watermark-title inline-block px-4 py-2 text-[5rem] sm:text-[7rem] md:text-[9rem] lg:text-[11rem] font-black leading-none tracking-tighter overflow-visible mb-12 md:mb-20" data-text="ROY">
                    ROY
                </h1>
            </div>
            <p class="text-xs md:text-sm lg:text-base text-white/60 tracking-[0.15em] md:tracking-[0.2em] font-light mt-6 md:mt-10 lg:mt-12 z-10 px-4">
                電腦視覺 · 流程自動化 · 影音工程<br>
                「從實務現場跨越至演算法開發，以精準的自動化邏輯，重構視覺工程的無限可能。」
            </p>

            <div class="pt-16 md:pt-24 flex flex-col items-center space-y-6 z-10">
                <a href="#works" class="btn-capsule group inline-flex items-center justify-center px-10 py-3 md:py-4 rounded-full text-sm font-medium tracking-[0.2em] transition-all duration-300">
                    <span class="pl-[0.2em]">進入系統</span>
                    <span class="ml-4 font-inter text-lg group-hover:translate-x-1 transition-transform duration-300">→</span>
                </a>
                
                <div class="text-[9px] md:text-[10px] tracking-[0.3em] font-inter text-[#c8a97e]/60 pl-[0.3em]">
                    * ENTER EXPERIENCE
                </div>
            </div>

        </div>
    </main>
    
<script>
    // ==========================================
    // 1. 自動化光軌特效 (Algorithmic Pathways)
    // ==========================================
    const canvas = document.getElementById('pathway-canvas');
    const ctx = canvas.getContext('2d');
    
    let w, h;
    let paths = [];
    const GRID_SIZE = 30; // 決定光軌轉折的網格大小

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        initPaths();
    });

    class Pathway {
        constructor() {
            this.reset();
        }

        reset() {
            // 確保生成點鎖定在網格上
            this.x = Math.floor(Math.random() * (w / GRID_SIZE)) * GRID_SIZE;
            this.y = Math.floor(Math.random() * (h / GRID_SIZE)) * GRID_SIZE;
            this.history = [{x: this.x, y: this.y}];
            this.maxLength = Math.floor(Math.random() * 40 + 20); // 拖影長度
            this.speed = 2; 
            
            // 初始方向
            this.setRandomDirection();
            
            this.age = 0;
            this.maxAge = Math.random() * 200 + 100; // 存活時間
            this.dead = false;
            this.opacity = Math.random() * 0.4 + 0.1; // 基礎亮度
        }

        setRandomDirection() {
            const dirs = [
                {vx: this.speed, vy: 0},
                {vx: -this.speed, vy: 0},
                {vx: 0, vy: this.speed},
                {vx: 0, vy: -this.speed}
            ];
            const dir = dirs[Math.floor(Math.random() * dirs.length)];
            this.vx = dir.vx;
            this.vy = dir.vy;
        }

        update() {
            if (this.dead) {
                // 等待尾巴跑完再重生
                if (this.history.length > 0) {
                    this.history.shift();
                } else {
                    this.reset();
                }
                return;
            }

            this.age++;
            if (this.age > this.maxAge || this.x < 0 || this.x > w || this.y < 0 || this.y > h) {
                this.dead = true;
                return;
            }

            // 只有在精準到達網格交叉點時，才有機率 90 度轉彎
            if (this.x % GRID_SIZE === 0 && this.y % GRID_SIZE === 0) {
                if (Math.random() < 0.25) { // 25% 轉彎機率
                    if (this.vx !== 0) {
                        this.vx = 0;
                        this.vy = Math.random() < 0.5 ? this.speed : -this.speed;
                    } else {
                        this.vy = 0;
                        this.vx = Math.random() < 0.5 ? this.speed : -this.speed;
                    }
                }
            }

            this.x += this.vx;
            this.y += this.vy;
            this.history.push({x: this.x, y: this.y});

            if (this.history.length > this.maxLength) {
                this.history.shift();
            }
        }

        draw() {
            if (this.history.length < 2) return;

            ctx.lineWidth = 1.5;
            
            // 繪製帶有漸層消失效果的軌跡拖影
            for (let i = 1; i < this.history.length; i++) {
                ctx.beginPath();
                ctx.moveTo(this.history[i-1].x, this.history[i-1].y);
                ctx.lineTo(this.history[i].x, this.history[i].y);
                
                let tailFade = i / this.history.length; // 越靠近頭部越亮
                let currentOpacity = this.opacity * tailFade;
                
                // 生命週期快結束時整體變暗
                if (this.age > this.maxAge - 30 && !this.dead) {
                    currentOpacity *= (this.maxAge - this.age) / 30; 
                }

                ctx.strokeStyle = `rgba(200, 169, 126, ${currentOpacity})`;
                ctx.stroke();
            }

            // 繪製頭部的高光資料點 (Data Node)
            if (!this.dead) {
                const head = this.history[this.history.length - 1];
                ctx.beginPath();
                ctx.arc(head.x, head.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 2})`;
                
                // 加上微弱的發光效果
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(200, 169, 126, 0.8)';
                ctx.fill();
                ctx.shadowBlur = 0; // 重置陰影避免影響線條
            }
        }
    }

    function initPaths() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        paths = [];
        // 控制畫面上的光軌數量
        let density = (w * h) / 25000; 
        for (let i = 0; i < density; i++) {
            paths.push(new Pathway());
            // 隨機錯開初始時間，讓光軌不會同時出生/死亡
            paths[i].age = Math.random() * paths[i].maxAge; 
        }
    }

    function animatePaths() {
        ctx.clearRect(0, 0, w, h);
        paths.forEach(path => {
            path.update();
            path.draw();
        });
        requestAnimationFrame(animatePaths);
    }

    initPaths();
    animatePaths();

    // ==========================================
    // 2. 自訂發光延遲游標
    // ==========================================
    const cursorDot = document.getElementById('cursor-dot');
    const cursorRing = document.getElementById('cursor-ring');
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let ringX = cursorX;
    let ringY = cursorY;

    window.addEventListener('mousemove', (e) => {
        cursorX = e.clientX;
        cursorY = e.clientY;
        if(cursorDot) {
            cursorDot.style.left = `${cursorX}px`;
            cursorDot.style.top = `${cursorY}px`;
        }
    });

    function animateCursor() {
        ringX += (cursorX - ringX) * 0.15;
        ringY += (cursorY - ringY) * 0.15;
        if(cursorRing) {
            cursorRing.style.left = `${ringX}px`;
            cursorRing.style.top = `${ringY}px`;
        }
        requestAnimationFrame(animateCursor);
    }
    animateCursor();

    const interactables = document.querySelectorAll('a, button');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
            if(cursorRing) cursorRing.classList.add('cursor-hover-active');
            if(cursorDot) {
                cursorDot.style.transform = 'translate(-50%, -50%) scale(0.6)';
                cursorDot.style.backgroundColor = '#c8a97e'; 
                cursorDot.style.boxShadow = '0 0 10px #fff, 0 0 20px #c8a97e, 0 0 30px #c8a97e';
            }
        });
        el.addEventListener('mouseleave', () => {
            if(cursorRing) cursorRing.classList.remove('cursor-hover-active');
            if(cursorDot) {
                cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorDot.style.backgroundColor = '#fff';
                cursorDot.style.boxShadow = '0 0 5px #fff, 0 0 10px #c8a97e, 0 0 20px #c8a97e, 0 0 30px rgba(200, 169, 126, 0.5)';
            }
        });
    });

    // ==========================================
    // 3. 磁性吸附按鈕
    // ==========================================
    const magneticBtn = document.querySelector('.btn-capsule');
    if(magneticBtn) {
        magneticBtn.addEventListener('mousemove', (e) => {
            const rect = magneticBtn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            magneticBtn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        });

        magneticBtn.addEventListener('mouseleave', () => {
            magneticBtn.style.transform = `translate(0px, 0px)`;
        });
    }
</script>
</body>
</html>
