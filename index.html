<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROY | AI Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c8a97e;
        }
        
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }

        .watermark-title {
            color: rgba(255, 255, 255, 0.08);
            user-select: none;
        }

        .btn-capsule {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .btn-capsule:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-white/20 selection:text-white">

    <canvas id="particle-canvas"></canvas>

    <main class="flex-grow flex items-center justify-center px-6 relative z-10 min-h-screen">
        <div class="max-w-7xl mx-auto w-full flex flex-col items-center justify-center text-center">
            
            <div class="text-xs md:text-sm font-bold tracking-[0.5em] text-white/80 mb-6 md:mb-10 pl-[0.5em]">
                K U A N . 2 0 2 6
            </div>

            <h1 class="watermark-title text-[8rem] sm:text-[12rem] md:text-[18rem] lg:text-[22rem] font-black leading-none tracking-tighter">
                ROY
            </h1>

            <p class="text-xs md:text-sm lg:text-base text-white/60 tracking-[0.15em] md:tracking-[0.2em] font-light mt-[-1rem] md:mt-[-3rem] lg:mt-[-5rem] z-10 px-4">
                「融合深厚的影音工程實戰經驗，跨足電腦視覺與 AI 應用。我致力於將複雜的現場需求，轉化為高效的演算法與自動化流程，重新定義現代視覺工程的標準。」
            </p>

            <div class="pt-16 md:pt-24 flex flex-col items-center space-y-6 z-10">
                <a href="#works" class="btn-capsule group inline-flex items-center justify-center px-10 py-3 md:py-4 rounded-full text-sm font-medium tracking-[0.2em] transition-all duration-300">
                    <span class="pl-[0.2em]">進入系統</span>
                    <span class="ml-4 font-inter text-lg group-hover:translate-x-1 transition-transform duration-300">→</span>
                </a>
                
                <div class="text-[9px] md:text-[10px] tracking-[0.3em] font-inter text-[#c8a97e]/60 pl-[0.3em]">
                    * ENTER EXPERIENCE
                </div>
            </div>

        </div>
    </main>
    
<script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    
    let particlesArray = [];
    let w, h;

    // 滑鼠互動區域設定
    const mouse = {
        x: null,
        y: null,
        radius: 150 // 滑鼠連線的觸發距離
    };

    window.addEventListener('mousemove', (event) => {
        mouse.x = event.x;
        mouse.y = event.y;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = null;
        mouse.y = null;
    });

    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        init();
    });

    // 粒子類別
    class Particle {
        constructor(x, y, directionX, directionY, size, color) {
            this.x = x;
            this.y = y;
            this.directionX = directionX;
            this.directionY = directionY;
            this.size = size;
            this.color = color;
        }

        // 繪製單一粒子
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
        }

        // 粒子移動與邊界碰撞邏輯
        update() {
            if (this.x > w || this.x < 0) {
                this.directionX = -this.directionX;
            }
            if (this.y > h || this.y < 0) {
                this.directionY = -this.directionY;
            }

            this.x += this.directionX;
            this.y += this.directionY;
            this.draw();
        }
    }

    // 初始化粒子陣列
    function init() {
        particlesArray = [];
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        
        // 根據螢幕大小決定粒子密度，12000 可依需求調整，數字越小越密集
        let numberOfParticles = (w * h) / 12000;
        
        for (let i = 0; i < numberOfParticles; i++) {
            let size = (Math.random() * 1.5) + 0.5; // 粒子大小
            let x = (Math.random() * ((w - size * 2) - (size * 2)) + size * 2);
            let y = (Math.random() * ((h - size * 2) - (size * 2)) + size * 2);
            // 控制粒子飄移速度
            let directionX = (Math.random() - 0.5) * 0.6; 
            let directionY = (Math.random() - 0.5) * 0.6;
            let color = 'rgba(200, 169, 126, 0.8)'; // 使用 --accent-gold 的 rgba 值

            particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
        }
    }

    // 動態連線邏輯
    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                // 粒子間的距離計算
                let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                             + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                
                // 若粒子間距小於設定值，則連線
                if (distance < (w / 15) * (h / 15)) {
                    opacityValue = 1 - (distance / 20000);
                    ctx.strokeStyle = `rgba(200, 169, 126, ${opacityValue})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                    ctx.stroke();
                }
            }

            // 滑鼠與粒子的距離計算
            if (mouse.x != null && mouse.y != null) {
                let dx = particlesArray[a].x - mouse.x;
                let dy = particlesArray[a].y - mouse.y;
                let mouseDistance = Math.sqrt(dx * dx + dy * dy);

                if (mouseDistance < mouse.radius) {
                    let mouseOpacity = 1 - (mouseDistance / mouse.radius);
                    ctx.strokeStyle = `rgba(200, 169, 126, ${mouseOpacity})`;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }
            }
        }
    }

    // 動畫循環
    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, w, h);

        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
        }
        connect();
    }

    init();
    animate();
</script>
</body>
</html>
